name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore run history
        uses: actions/cache/restore@v4
        with:
          path: custom-report/runs
          key: run-history-never-matches
          restore-keys: |
            run-history-

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: npm test

      - name: Save run history
        if: always()
        uses: actions/cache/save@v4
        with:
          path: custom-report/runs
          key: run-history-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload custom report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-report-${{ github.run_number }}
          path: custom-report/
          retention-days: 30

      - name: Copy test results into report for Pages
        if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: cp -r test-results custom-report/test-results || true

      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: custom-report/

      - name: Upload test results (traces & videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          node << 'JSEOF'
          const fs = require('fs');
          const dir = 'custom-report/runs';
          if (!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir)
            .filter(f => f.endsWith('.json') && !f.startsWith('.'))
            .sort().reverse();
          if (!files.length) process.exit(0);

          const r = JSON.parse(fs.readFileSync(dir + '/' + files[0], 'utf8'));
          const allTests = r.suites.flatMap(s => s.tests);
          const skipped = allTests.filter(t => t.status === 'skipped').length;
          const passRate = r.total ? Math.round((r.passed / r.total) * 100) : 0;
          const m = Math.floor(r.duration / 60000);
          const s = Math.round((r.duration % 60000) / 1000);
          const dur = m > 0 ? `${m}m ${s}s` : `${s}s`;
          const titleEmoji = r.failed === 0 ? '✅' : '❌';

          const rows = allTests.map(t => {
            const emoji = t.status === 'passed' ? '✅' : t.status === 'skipped' ? '⏭️' : '❌';
            const tm = Math.floor(t.duration / 60000);
            const ts = Math.round((t.duration % 60000) / 1000);
            const tdur = tm > 0 ? `${tm}m ${ts}s` : `${ts}s`;
            const error = t.error ? `<br/><sub>${t.error.split('\n')[0].slice(0, 120).replace(/</g,'&lt;')}</sub>` : '';
            return `<tr><td align="center">${emoji}</td><td>${t.title}${error}</td><td align="right"><code>${tdur}</code></td></tr>`;
          }).join('\n');

          const summary = `
          ## ${titleEmoji} Foleon E2E Test Results

          | | Count |
          |:--|--:|
          | ✅ Passed | **${r.passed}** |
          | ❌ Failed | **${r.failed}** |
          | ⏭️ Skipped | **${skipped}** |
          | 🔢 Total | **${r.total}** |
          | 🎯 Pass rate | **${passRate}%** |
          | ⏱️ Duration | **${dur}** |

          ---

          ### Test Details

          <table>
          <thead><tr><th>Result</th><th>Test</th><th align="right">Duration</th></tr></thead>
          <tbody>
          ${rows}
          </tbody>
          </table>
          `;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');
          JSEOF

      - name: Build Slack payload
        if: always()
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          TRIGGER: ${{ github.event_name }}
        run: |
          cat > build-payload.js << 'JSEOF'
          const fs = require('fs');
          const dir = 'custom-report/runs';
          if (!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir)
            .filter(f => f.endsWith('.json') && !f.startsWith('.'))
            .sort().reverse();
          if (!files.length) process.exit(0);

          const r = JSON.parse(fs.readFileSync(dir + '/' + files[0], 'utf8'));
          const m = Math.floor(r.duration / 60000);
          const s = Math.round((r.duration % 60000) / 1000);
          const dur = m > 0 ? `${m}m ${s}s` : `${s}s`;

          const skipped = r.suites.flatMap(s => s.tests).filter(t => t.status === 'skipped').length;
          const resultEmoji = r.failed === 0 ? '✅' : '❌';
          const resultLabel = r.failed === 0 ? 'READY TO RELEASE' : 'FAILURE';
          const shortSha = (process.env.COMMIT_SHA || '').slice(0, 7);

          const statsLine = `✅ *${r.passed}/${r.total} passed* • ❌ *${r.failed} failed* • ⏭️ *${skipped} skipped* • ⏱️ *${dur}*`;

          const blocks = [
            {
              type: 'section',
              text: { type: 'mrkdwn', text: `*${resultEmoji} Foleon E2E — ${resultLabel}*` }
            },
            {
              type: 'section',
              text: { type: 'mrkdwn', text: statsLine }
            },
          ];

          if (r.failed > 0) {
            const failedTests = r.suites.flatMap(suite => suite.tests)
              .filter(t => t.status === 'failed')
              .map(t => {
                const tm = Math.floor(t.duration / 60000);
                const ts = Math.round((t.duration % 60000) / 1000);
                const tdur = tm > 0 ? `${tm}m ${ts}s` : `${ts}s`;
                const title = t.title.length > 80 ? t.title.slice(0, 77) + '...' : t.title;
                return `❌ ${title} _(${tdur})_`;
              });
            blocks.push({
              type: 'section',
              text: { type: 'mrkdwn', text: `*Failed Tests*\n${failedTests.join('\n')}` }
            });
          }

          blocks.push({
            type: 'context',
            elements: [
              {
                type: 'mrkdwn',
                text: `Branch: \`${process.env.BRANCH}\` • Commit: \`${shortSha}\` — By: ${process.env.ACTOR} • Trigger: ${process.env.TRIGGER}`
              }
            ]
          });

          blocks.push({
            type: 'actions',
            elements: [
              {
                type: 'button',
                style: r.failed === 0 ? 'primary' : 'danger',
                text: { type: 'plain_text', text: 'View Run →' },
                url: process.env.RUN_URL
              }
            ]
          });

          fs.writeFileSync('slack-payload.json', JSON.stringify({ blocks }));
          console.log('Slack payload built successfully');
          JSEOF
          node build-payload.js

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          if [ ! -f slack-payload.json ]; then
            echo "No payload file — skipping"
            exit 0
          fi
          echo "Sending Slack notification..."
          curl -f -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data @slack-payload.json

  deploy:
    name: Deploy Report to Pages
    needs: test
    if: always() && github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
