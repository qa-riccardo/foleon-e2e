name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload custom report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-report-${{ github.run_number }}
          path: custom-report/
          retention-days: 30

      - name: Upload test results (traces & videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          node << 'JSEOF'
          const fs = require('fs');
          const dir = 'custom-report/runs';
          if (!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir)
            .filter(f => f.endsWith('.json') && !f.startsWith('.'))
            .sort().reverse();
          if (!files.length) process.exit(0);

          const r = JSON.parse(fs.readFileSync(dir + '/' + files[0], 'utf8'));
          const allTests = r.suites.flatMap(s => s.tests);
          const skipped = allTests.filter(t => t.status === 'skipped').length;
          const passRate = r.total ? Math.round((r.passed / r.total) * 100) : 0;
          const m = Math.floor(r.duration / 60000);
          const s = Math.round((r.duration % 60000) / 1000);
          const dur = m > 0 ? `${m}m ${s}s` : `${s}s`;
          const titleEmoji = r.failed === 0 ? '✅' : '❌';

          const rows = allTests.map(t => {
            const emoji = t.status === 'passed' ? '✅' : t.status === 'skipped' ? '⏭️' : '❌';
            const tm = Math.floor(t.duration / 60000);
            const ts = Math.round((t.duration % 60000) / 1000);
            const tdur = tm > 0 ? `${tm}m ${ts}s` : `${ts}s`;
            const error = t.error ? `<br/><sub>${t.error.split('\n')[0].slice(0, 120).replace(/</g,'&lt;')}</sub>` : '';
            return `<tr><td align="center">${emoji}</td><td>${t.title}${error}</td><td align="right"><code>${tdur}</code></td></tr>`;
          }).join('\n');

          const summary = `
          ## ${titleEmoji} Foleon E2E Test Results

          | | Count |
          |:--|--:|
          | ✅ Passed | **${r.passed}** |
          | ❌ Failed | **${r.failed}** |
          | ⏭️ Skipped | **${skipped}** |
          | 🔢 Total | **${r.total}** |
          | 🎯 Pass rate | **${passRate}%** |
          | ⏱️ Duration | **${dur}** |

          ---

          ### Test Details

          <table>
          <thead><tr><th>Result</th><th>Test</th><th align="right">Duration</th></tr></thead>
          <tbody>
          ${rows}
          </tbody>
          </table>
          `;

          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary + '\n');
          JSEOF

      - name: Build Slack payload
        if: always()
        env:
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BRANCH: ${{ github.ref_name }}
        run: |
          cat > build-payload.js << 'JSEOF'
          const fs = require('fs');
          const dir = 'custom-report/runs';
          if (!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir)
            .filter(f => f.endsWith('.json') && !f.startsWith('.'))
            .sort().reverse();
          if (!files.length) process.exit(0);

          const r = JSON.parse(fs.readFileSync(dir + '/' + files[0], 'utf8'));
          const m = Math.floor(r.duration / 60000);
          const s = Math.round((r.duration % 60000) / 1000);
          const dur = m > 0 ? `${m}m ${s}s` : `${s}s`;

          const tests = r.suites.flatMap(suite => suite.tests.map(t => {
            const emoji = t.status === 'passed' ? '✅' : t.status === 'skipped' ? '⏭' : '❌';
            const tm = Math.floor(t.duration / 60000);
            const ts = Math.round((t.duration % 60000) / 1000);
            const tdur = tm > 0 ? `${tm}m ${ts}s` : `${ts}s`;
            const title = t.title.length > 72 ? t.title.slice(0, 69) + '...' : t.title;
            return `${emoji} ${title}  \`${tdur}\``;
          }));

          const resultEmoji = r.failed === 0 ? '✅' : '❌';
          const resultTitle = r.failed === 0 ? 'All tests passed' : `${r.failed} test(s) failed`;

          const payload = {
            blocks: [
              {
                type: 'header',
                text: { type: 'plain_text', text: `${resultEmoji} Foleon E2E — Run #${process.env.RUN_NUMBER}` }
              },
              {
                type: 'section',
                fields: [
                  { type: 'mrkdwn', text: `*Result*\n${resultTitle}` },
                  { type: 'mrkdwn', text: `*Duration*\n${dur}` },
                  { type: 'mrkdwn', text: `*Passed*\n${r.passed} / ${r.total}` },
                  { type: 'mrkdwn', text: `*Branch*\n${process.env.BRANCH}` },
                ]
              },
              { type: 'divider' },
              {
                type: 'section',
                text: { type: 'mrkdwn', text: '*Test Results*\n' + tests.join('\n') }
              },
              { type: 'divider' },
              {
                type: 'actions',
                elements: [
                  {
                    type: 'button',
                    style: 'primary',
                    text: { type: 'plain_text', text: 'View Run & Report →' },
                    url: process.env.RUN_URL
                  }
                ]
              }
            ]
          };

          fs.writeFileSync('slack-payload.json', JSON.stringify(payload));
          console.log('Slack payload built successfully');
          JSEOF
          node build-payload.js

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping"
            exit 0
          fi
          if [ ! -f slack-payload.json ]; then
            echo "No payload file — skipping"
            exit 0
          fi
          echo "Sending Slack notification..."
          curl -f -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data @slack-payload.json
