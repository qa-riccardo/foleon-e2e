name: Playwright E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30

      - name: Upload custom report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: custom-report-${{ github.run_number }}
          path: custom-report/
          retention-days: 30

      - name: Upload test results (traces & videos)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: test-results/
          retention-days: 7

      - name: Parse test results
        if: always()
        id: results
        run: |
          node -e "
          const fs = require('fs');
          const dir = 'custom-report/runs';
          if (!fs.existsSync(dir)) process.exit(0);
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('.')).sort().reverse();
          if (!files.length) process.exit(0);
          const r = JSON.parse(fs.readFileSync(dir + '/' + files[0], 'utf8'));
          const m = Math.floor(r.duration / 60000);
          const s = Math.round((r.duration % 60000) / 1000);
          const dur = m > 0 ? m + 'm ' + s + 's' : s + 's';
          const out = 'TOTAL=' + r.total + '\nPASSED=' + r.passed + '\nFAILED=' + r.failed + '\nDURATION=' + dur + '\nSTATUS=' + r.status;
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, out + '\n');
          "

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret not set — skipping notification"
            exit 0
          fi

          FAILED="${{ steps.results.outputs.FAILED }}"
          PASSED="${{ steps.results.outputs.PASSED }}"
          TOTAL="${{ steps.results.outputs.TOTAL }}"
          DURATION="${{ steps.results.outputs.DURATION }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$FAILED" = "0" ]; then
            EMOJI="✅"; TITLE="All tests passed"
          else
            EMOJI="❌"; TITLE="${FAILED} test(s) failed"
          fi

          echo "Sending Slack notification... PASSED=$PASSED FAILED=$FAILED TOTAL=$TOTAL DURATION=$DURATION"

          curl -f -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"blocks\": [
                {
                  \"type\": \"header\",
                  \"text\": { \"type\": \"plain_text\", \"text\": \"$EMOJI Foleon E2E — Run #${{ github.run_number }}\" }
                },
                {
                  \"type\": \"section\",
                  \"fields\": [
                    { \"type\": \"mrkdwn\", \"text\": \"*Result*\n${TITLE}\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Duration*\n${DURATION}\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Passed*\n${PASSED} / ${TOTAL}\" },
                    { \"type\": \"mrkdwn\", \"text\": \"*Branch*\n${{ github.ref_name }}\" }
                  ]
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [{
                    \"type\": \"button\",
                    \"text\": { \"type\": \"plain_text\", \"text\": \"View Run →\" },
                    \"url\": \"${RUN_URL}\"
                  }]
                }
              ]
            }"
